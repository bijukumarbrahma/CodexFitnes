<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#38bdf8">
  <title>Login | Codex Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.webmanifest?v=6">
  <link rel="stylesheet" href="css/styles.css?v=6">
</head>
<body>
  <main class="auth-page" data-page="login">
    <section class="auth-visual">
      <div>
        <div class="brand" style="margin-bottom: 28px;">
          <span class="brand-mark"><i data-lucide="dumbbell"></i></span>
<span>CodexFitness</span>
        </div>
        <h1>Welcome back to the floor.</h1>
        <p>Your streak, lifts, macros, and recovery markers are waiting.</p>
      </div>
    </section>
    <aside class="auth-side">
      <form class="auth-card" id="loginForm">
        <a class="brand" href="index.html">
          <span class="brand-mark"><i data-lucide="activity"></i></span>
          <span>Codex Fitness</span>
        </a>
        <h2>Log in</h2>
        <p>Keep your gym data synced across dashboard, analytics, nutrition, body stats, and admin tools.</p>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>
        <div class="field" style="margin-top: 12px;">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <div class="button-row" style="margin-top: 18px;">
          <button class="button primary" type="submit"><i data-lucide="log-in"></i><span>Log In</span></button>
          <button class="button" type="button" id="forgotBtn"><i data-lucide="key-round"></i><span>Forgot</span></button>
        </div>
        
        <div class="auth-divider" style="display: flex; align-items: center; text-align: center; margin: 24px 0;">
          <hr style="flex-grow: 1; border: none; border-top: 1px solid rgba(125,158,184,0.15); margin: 0;">
          <span style="padding: 0 12px; color: var(--text-secondary); font-size: 14px; font-weight: 500;">OR</span>
          <hr style="flex-grow: 1; border: none; border-top: 1px solid rgba(125,158,184,0.15); margin: 0;">
        </div>
        <button class="button" type="button" id="googleLoginBtn" style="width: 100%; justify-content: center; margin-bottom: 24px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="margin-right: 8px;"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg><span>Continue with Google</span>
        </button>

        <p class="auth-switch">New here? <a href="register.html">Create an account</a></p>
      </form>
    </aside>
  </main>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-data.js"></script>
  <script src="js/app.js?v=7"></script>
</body>
</html>
