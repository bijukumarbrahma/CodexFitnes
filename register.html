<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#38bdf8">
  <title>Register | Codex Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.webmanifest?v=4">
  <link rel="stylesheet" href="css/styles.css?v=4">
</head>
<body>
  <main class="auth-page" data-page="register">
    <section class="auth-visual">
      <div>
        <div class="brand" style="margin-bottom: 28px;">
          <span class="brand-mark"><i data-lucide="dumbbell"></i></span>
          <span>Codex Fitness</span>
        </div>
        <h1>Build your training operating system.</h1>
        <p>The first account becomes admin, so you can manage users and activity from the secure admin panel.</p>
      </div>
    </section>
    <aside class="auth-side">
      <form class="auth-card" id="registerForm">
        <a class="brand" href="index.html">
          <span class="brand-mark"><i data-lucide="sparkles"></i></span>
          <span>Codex Fitness</span>
        </a>
        <h2>Create account</h2>
        <p>Start with secure login, then tune targets from your profile.</p>
        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" autocomplete="name" required>
        </div>
        <div class="field" style="margin-top: 12px;">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>
        <div class="field" style="margin-top: 12px;">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" minlength="6" required>
        </div>
        <button class="button primary" type="submit" style="margin-top: 18px;"><i data-lucide="user-plus"></i><span>Create Account</span></button>
        <p class="auth-switch">Already tracking? <a href="login.html">Log in</a></p>
      </form>
    </aside>
  </main>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
